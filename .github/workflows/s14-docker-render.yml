name: S16 - Final CI/CD (Test + Docker Hub + Render)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: devops-e2-s13-hola-mundo
  APP_DIR: semana13-despliegue-produccion/app

concurrency:
  group: s16-final-cicd
  cancel-in-progress: true

jobs:
  test-build-push:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.vars.outputs.image_repo }}
      sha_short: ${{ steps.vars.outputs.sha_short }}
      date_utc: ${{ steps.vars.outputs.date_utc }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Run unit tests
        working-directory: ${{ env.APP_DIR }}
        run: npm test

      - name: Validate Docker Hub secrets
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -z "$DOCKER_USERNAME" ]; then
            echo "Falta configurar el secret DOCKER_USERNAME."
            exit 1
          fi

          if [ -z "$DOCKER_PASSWORD" ]; then
            echo "Falta configurar el secret DOCKER_PASSWORD (Access Token recomendado)."
            exit 1
          fi

      - name: Set image tags
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date_utc=$(date -u +'%Y%m%d')" >> "$GITHUB_OUTPUT"
          echo "image_repo=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./semana13-despliegue-produccion
          file: ./semana13-despliegue-produccion/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_repo }}:latest
            ${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.date_utc }}

  deploy-render:
    runs-on: ubuntu-latest
    needs: test-build-push

    steps:
      - name: Validate Render secrets
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "Falta configurar el secret RENDER_API_KEY."
            exit 1
          fi

          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Falta configurar el secret RENDER_SERVICE_ID."
            exit 1
          fi

      - name: Trigger Render deploy
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Publish deployment summary
        run: |
          {
            echo "### S16 deployment triggered"
            echo "- Test stage: npm ci + npm test (OK)"
            echo "- Docker image: ${{ needs.test-build-push.outputs.image_repo }}:latest"
            echo "- Extra tags: ${{ needs.test-build-push.outputs.sha_short }}, ${{ needs.test-build-push.outputs.date_utc }}"
            echo "- Render deploy: trigger enviado correctamente"
          } >> "$GITHUB_STEP_SUMMARY"
